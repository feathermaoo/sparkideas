<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>閃念點子冒險實驗錄</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #fcf8f2; /* 溫暖的日系手作奶油白 */
            --card-bg: #ffffff;
            --stitch-color: #cca483; /* 縫線的咖啡色 */
            --accent-pink: #f7a3a1; /* 手作布偶粉 */
            --accent-green: #a8d3bb; /* 森林手繪綠 */
            --accent-yellow: #fcd59b; /* 溫馨黃 */
            --accent-blue: #a3c9e6; /* 晴空藍 */
            --accent-purple: #c5b3e6; /* 薰衣草紫 */
            --text-main: #695749; /* 深咖啡色字體，拒絕死黑 */
            --text-muted: #a69282;
            --border-radius: 20px;
        }

        /* 👑 雙重保險 1：強制所有網頁標籤，甚至包含動態生成的內容都必須使用可愛圓體 */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Zen Maru Gothic", "Chalkboard SE", "Microsoft JhengHei", sans-serif !important;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-y: auto;
            background-image: linear-gradient(rgba(204, 164, 131, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(204, 164, 131, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 24px;
        }

        /* 標題區 */
        .header {
            text-align: center;
            margin-bottom: 2px;
            flex-shrink: 0;
        }

        .header h1 {
            color: #b56c4d;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .header h1 i {
            color: var(--accent-pink);
            animation: bounce 2s ease-in-out infinite;
        }

        .header p {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 2px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-4px) scale(1.05); }
        }

        /* Google 登入狀態橫條 */
        .g-sync-banner {
            background-color: #f8f4ee;
            border: 1px dashed var(--stitch-color);
            border-radius: 14px;
            padding: 8px 14px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #b56c4d;
            font-weight: bold;
        }

        .g-btn-style {
            background-color: #ffffff;
            border: 1px solid #cca483;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 10px;
            color: #695749;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .g-btn-style:hover { background-color: #fcf8f2; }

        /* 經典拼布手作卡片 */
        .stitch-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 16px;
            box-shadow: 0 4px 12px rgba(166, 146, 130, 0.12);
            border: 2px dashed var(--stitch-color);
            position: relative;
            flex-shrink: 0;
        }

        .level-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        /* 👑 鈕扣比例回復到好看的 70px 外觀 */
        .level-badge {
            background-color: var(--accent-yellow);
            border: 2px dashed #ffffff;
            color: #b56c4d;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(166, 146, 130, 0.2);
            flex-shrink: 0;
            line-height: 1.2;
            padding-top: 2px;
        }

        /* 👑 雙重保險 2：確保動態產生的 LV.字樣也是圓體，大小剛好不擠壓 */
        .lvl-text-num {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #b56c4d;
        }

        /* 👑 完美放大 2.5 倍的盾牌與冒險裝備圖示（26px） */
        .lvl-icon-large {
            font-size: 26px !important; 
            margin-top: 1px;
            display: inline-block;
        }

        .level-progress-container {
            flex-grow: 1;
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .current-title {
            font-size: 14px;
            font-weight: bold;
            color: #b56c4d;
        }

        .xp-text {
            font-size: 11px;
            color: var(--text-muted);
        }

        .progress-bar-bg {
            background-color: #f3ece4;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #e2d7cb;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-yellow));
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-box {
            background-color: #fffdfa;
            border-radius: 14px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #ebdccb;
        }

        .stat-details div:first-child { font-size: 15px; font-weight: bold; }
        .stat-details div:last-child { font-size: 11px; color: var(--text-muted); }

        /* 輸入區塊 */
        .input-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 14px;
            box-shadow: 0 4px 12px rgba(166, 146, 130, 0.12);
            border: 2px dashed var(--stitch-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .input-row { display: flex; gap: 8px; align-items: center; }
        .input-row input {
            flex-grow: 1; background-color: #faf6f0; border: 2px solid #ebdccb;
            border-radius: 14px; padding: 10px 14px; color: var(--text-main); font-size: 14px; outline: none;
        }
        .input-row input:focus { border-color: var(--accent-pink); background-color: #ffffff; }

        .add-btn {
            background-color: #e88d67; border: 2px solid #ffffff; width: 44px; height: 44px; border-radius: 14px;
            color: white; font-size: 18px; font-weight: bold; cursor: pointer; display: flex;
            justify-content: center; align-items: center; box-shadow: 0 4px 8px rgba(166, 146, 130, 0.2); flex-shrink: 0;
        }

        .tag-selector, .frequency-selector, .filter-row, .chart-filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; flex-shrink: 0; }
        .tag-selector::-webkit-scrollbar, .frequency-selector::-webkit-scrollbar, .filter-row::-webkit-scrollbar, .chart-filter-row::-webkit-scrollbar { display: none; }

        .tag-btn, .freq-btn, .filter-btn, .range-btn, .chart-tag-btn {
            background-color: #faf6f0; border: 1px dashed var(--stitch-color); color: var(--text-main);
            padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px;
        }

        .tag-btn.active { background-color: var(--accent-pink); border-style: solid; border-color: #ffffff; color: white; }
        .freq-btn.active { background-color: var(--accent-green); border-style: solid; border-color: #ffffff; color: white; }
        .filter-btn.active { background-color: var(--accent-blue); border-style: solid; border-color: #ffffff; color: white; }
        .chart-tag-btn.active { background-color: var(--accent-purple); border-style: solid; border-color: #ffffff; color: white; }
        .add-custom-tag-btn { background-color: transparent; border: 1px dashed #b56c4d; color: #b56c4d; padding: 5px 10px; }

        .task-list { display: flex; flex-direction: column; gap: 10px; max-height: 320px; overflow-y: auto; padding-right: 2px; }
        .task-item {
            background-color: var(--card-bg); border-radius: 16px; padding: 12px 14px; display: flex;
            align-items: center; justify-content: space-between; gap: 12px; box-shadow: 0 2px 8px rgba(166, 146, 130, 0.08);
            border: 1px solid #f3ece4; border-left: 5px solid var(--accent-pink); flex-shrink: 0;
        }
        .task-left { display: flex; align-items: center; gap: 12px; flex-grow: 1; cursor: pointer; }
        .custom-checkbox { width: 22px; height: 22px; border: 2px solid #cca483; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: transparent; font-size: 11px; background-color: #ffffff; flex-shrink: 0; }
        .task-item.completed .custom-checkbox { background-color: var(--accent-green); border-color: var(--accent-green); color: white; }
        .task-item.completed .task-text { text-decoration: line-through; color: var(--text-muted); }
        .delete-btn { background: none; border: none; color: #ebdccb; cursor: pointer; font-size: 14px; padding: 6px; flex-shrink: 0; }

        .chart-toggle-header {
            background-color: #ebdccb; color: #b56c4d; padding: 10px 16px; border-radius: 14px; font-size: 13px; font-weight: bold;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px dashed var(--stitch-color); margin-top: 2px;
        }
        .chart-container-wrapper { display: none; background-color: var(--card-bg); border-radius: var(--border-radius); padding: 14px; border: 2px dashed var(--stitch-color); flex-direction: column; gap: 10px; }
        .chart-controls { display: flex; justify-content: space-between; align-items: center; }

        .feather-footer { text-align: center; padding: 12px 0 6px 0; font-size: 11px; color: var(--text-muted); letter-spacing: 2px; font-weight: bold; border-top: 1px dashed #ebdccb; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-teddy-bear"></i> 閃念點子冒險實驗錄</h1>
            <p>縫製每一個閃念，織成最棒的自己 🧶</p>
        </div>

        <div class="g-sync-banner">
            <span id="syncIconText"><i class="fas fa-key"></i> 進度儲存：在地記憶體</span>
            <button class="g-btn-style" id="gLoginBtn" onclick="handleAuthClick()">
                <i class="fab fa-google"></i> <span id="gBtnText">連動 Google 帳號</span>
            </button>
        </div>

        <div class="stitch-card">
            <div class="level-info">
                <div class="level-badge" id="levelDisplay"></div>
                <div class="level-progress-container">
                    <div class="title-row">
                        <span class="current-title" id="titleDisplay">迷途夢想家</span>
                        <span class="xp-text" id="xpText">0 / 100 XP</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progressBar"></div>
                    </div>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-icon fire"><i class="fas fa-heart"></i></div>
                    <div class="stat-details"><div id="streakDisplay">0</div><div>連續記錄天數</div></div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon check"><i class="fas fa-gift"></i></div>
                    <div class="stat-details"><div id="completedCountDisplay">0</div><div>已缝製點子</div></div>
                </div>
            </div>
        </div>

        <div class="input-card">
            <div class="input-row">
                <input type="text" id="taskInput" placeholder="捕捉到一個手寫念頭...">
                <button class="add-btn" id="addTaskBtn"><i class="fas fa-plus"></i></button>
            </div>
            <div class="section-label">🧵 選擇分類：</div>
            <div class="tag-selector" id="tagSelector"></div>
            <div class="section-label">🔄 重複頻率：</div>
            <div class="frequency-selector" id="freqSelector">
                <button class="freq-btn active" data-freq="單次"><i class="fas fa-star"></i> 單次</button>
                <button class="freq-btn" data-freq="每日"><i class="fas fa-clock"></i> 每日</button>
                <button class="freq-btn" data-freq="每週"><i class="fas fa-calendar-alt"></i> 每週</button>
                <button class="freq-btn" data-freq="每月"><i class="fas fa-cloud"></i> 每月</button>
            </div>
        </div>

        <div class="filter-row" id="filterRow"></div>
        <div class="task-list" id="taskList"></div>

        <div class="chart-toggle-header" id="chartToggleBtn">
            <span><i class="fas fa-chart-line"></i> 📊 查看冒險歷程圖表</span>
            <i class="fas fa-chevron-down" id="arrowIcon"></i>
        </div>

        <div class="chart-container-wrapper" id="chartWrapper">
            <div class="chart-controls">
                <span style="font-size: 12px; font-weight: bold; color: #b56c4d;">🧶 縫製能量歷史紀錄</span>
                <div class="range-selector-row">
                    <button class="range-btn active" data-range="7">7D</button>
                    <button class="range-btn" data-range="30">30D</button>
                </div>
            </div>
            <div class="chart-filter-row" id="chartFilterRow"></div>
            <canvas id="historyChart" style="max-height: 120px; width: 100%;"></canvas>
        </div>

        <div class="feather-footer">
            🕊️ DESIGN BY FEATHERMAOO
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" onload="onGapiLoad()" async defer></script>

    <script>
        const CLIENT_ID = '578239870910-1chkp51qfrjqie8kosuna3vkhvo2ulls.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';

        let state = {
            level: 1, xp: 0, streak: 0, completedCount: 0,
            tasks: [], customTags: ["待辦任務", "購物清單", "想讀的書"],
            lastActiveDate: "", historyData: {}, historyDataV2: {}
        };

        const titles = ["迷途夢想家", "見習冒險者", "精靈使者", "閃念掌控者", "行動傳奇"];
        let currentSelectedTag = "待辦任務";
        let currentSelectedFreq = "單次";
        let currentFilter = "全部";
        let currentChartFilter = "全部";
        let currentRange = 7; 
        let myChart = null;
        let tokenClient = null;
        let googleAccessToken = null;
        let isGapiLoaded = false;

        const tagIcons = { "待辦任務": "fa-clipboard-list", "購物清單": "fa-shopping-bag", "想讀的書": "fa-book-open", "運動": "fa-dumbbell", "保險": "fa-shield-heart", "客戶": "fa-user-check" };

        document.addEventListener("DOMContentLoaded", () => {
            loadFromStorage();
            checkStreak();
            checkAndResetRepeatingTasks();
            initEventListeners();
            renderSelectors();
            renderChartSelectors();
            render();
        });

        function onGapiLoad() {
            isGapiLoaded = true;
            if (typeof gapi !== 'undefined') {
                gapi.load('client', () => {
                    initGoogleIdentity();
                });
            }
        }

        function initGoogleIdentity() {
            try {
                if (typeof google !== 'undefined') {
                    tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: CLIENT_ID,
                        scope: SCOPES,
                        callback: async (resp) => {
                            if (resp.error) return;
                            googleAccessToken = resp.access_token;
                            localStorage.setItem("g_drive_access_token", googleAccessToken);
                            setSyncUIMode(true);
                            await loadFromGoogleDrive();
                        }
                    });

                    const savedToken = localStorage.getItem("g_drive_token_active");
                    if (savedToken === "true") {
                        document.getElementById("gBtnText").innerText = "雲端讀取中...";
                        setTimeout(() => {
                            tokenClient.requestAccessToken({ prompt: 'none' }); 
                        }, 800);
                    }
                }
            } catch (e) { console.error("Google 初始化失敗", e); }
        }

        function setSyncUIMode(isCloud) {
            if(isCloud) {
                document.getElementById("gBtnText").innerText = "已連動雲端";
                document.getElementById("syncIconText").innerHTML = `<i class="fas fa-cloud" style="color:#a8d3bb;"></i> 雲端模式：Google Drive 同步中`;
                localStorage.setItem("g_drive_token_active", "true");
            } else {
                document.getElementById("gBtnText").innerText = "連動 Google 帳號";
                document.getElementById("syncIconText").innerHTML = `<i class="fas fa-key"></i> 進度儲存：在地記憶體`;
                localStorage.setItem("g_drive_token_active", "false");
            }
        }

        function handleAuthClick() {
            if (!isGapiLoaded || !tokenClient) {
                alert("Google 雲端元件正在載入中，請稍等一秒後再點擊一次喔！🧸");
                return;
            }
            tokenClient.requestAccessToken({ prompt: 'consent' });
        }

        async function loadFromGoogleDrive() {
            if (!googleAccessToken) return;
            try {
                let res = await fetch('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder', {
                    headers: { 'Authorization': `Bearer ${googleAccessToken}` }
                });
                let data = await res.json();
                let file = data.files.find(f => f.name === 'spark_ideas_backup.json');
                
                if (file) {
                    let fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
                        headers: { 'Authorization': `Bearer ${googleAccessToken}` }
                    });
                    let cloudState = await fileRes.json();
                    if (cloudState && (cloudState.completedCount >= state.completedCount || state.tasks.length === 0)) {
                        state = { ...state, ...cloudState };
                        if (!state.historyDataV2) state.historyDataV2 = {};
                        localStorage.setItem("quest_log_state", JSON.stringify(state));
                        renderSelectors();
                        renderChartSelectors();
                        render();
                        if (myChart) updateChart();
                    }
                }
            } catch (e) { 
                console.error("雲端讀取錯誤", e);
                setSyncUIMode(false);
            }
        }

        async function saveToGoogleDrive() {
            if (!googleAccessToken) return;
            try {
                let res = await fetch('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder', {
                    headers: { 'Authorization': `Bearer ${googleAccessToken}` }
                });
                let data = await res.json();
                let file = data.files.find(f => f.name === 'spark_ideas_backup.json');
                
                let metadata = { name: 'spark_ideas_backup.json', parents: ['appDataFolder'] };
                let boundary = 'foo_bar_baz';
                let delimiter = `\r\n--${boundary}\r\n`;
                let closeDelim = `\r\n--${boundary}--`;
                
                let multipartRequestBody =
                    delimiter + 'Content-Type: application/json\r\n\r\n' + JSON.stringify(metadata) +
                    delimiter + 'Content-Type: application/json\r\n\r\n' + JSON.stringify(state) + closeDelim;

                let url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
                let method = 'POST';

                if (file) {
                    url = `https://www.googleapis.com/upload/drive/v3/files/${file.id}?uploadType=multipart`;
                    method = 'PATCH';
                }

                await fetch(url, {
                    method: method,
                    headers: { 'Authorization': `Bearer ${googleAccessToken}`, 'Content-Type': `multipart/related; boundary=${boundary}` },
                    body: multipartRequestBody
                });
            } catch (e) { console.error("雲端儲存錯誤", e); }
        }

        function loadFromStorage() {
            try {
                const savedState = localStorage.getItem("quest_log_state");
                if (savedState) {
                    state = { ...state, ...JSON.parse(savedState) };
                    if (!state.historyDataV2) state.historyDataV2 = {};
                }
            } catch (e) { console.error(e); }
        }

        function saveToStorage() {
            localStorage.setItem("quest_log_state", JSON.stringify(state));
            saveToGoogleDrive(); 
        }

        function renderSelectors() {
            const tagSelector = document.getElementById("tagSelector");
            tagSelector.innerHTML = "";
            state.customTags.forEach(tag => {
                const isActive = tag === currentSelectedTag ? "active" : "";
                const iconClass = tagIcons[tag] || "fa-tag"; 
                tagSelector.innerHTML += `<button class="tag-btn ${isActive}" data-tag="${tag}"><i class="fas ${iconClass}"></i> ${tag}</button>`;
            });
            tagSelector.innerHTML += `<button class="tag-btn add-custom-tag-btn" id="addCustomTagBtn"><i class="fas fa-plus"></i> 分類</button>`;

            const filterRow = document.getElementById("filterRow");
            filterRow.innerHTML = `<button class="filter-btn ${currentFilter === '全部' ? 'active' : ''}" data-filter="全部">✨ 全部 <span id="count-全部">0</span></button>`;
            state.customTags.forEach(tag => {
                const isActive = tag === currentFilter ? "active" : "";
                const iconClass = tagIcons[tag] || "fa-tag";
                filterRow.innerHTML += `<button class="filter-btn ${isActive}" data-filter="${tag}"><i class="fas ${iconClass}"></i> ${tag} <span id="count-${tag}">0</span></button>`;
            });
            rebindSelectorEvents();
        }

        function renderChartSelectors() {
            const chartFilterRow = document.getElementById("chartFilterRow");
            chartFilterRow.innerHTML = `<button class="chart-tag-btn ${currentChartFilter === '全部' ? 'active' : ''}" data-cfilter="全部">✨ 全部</button>`;
            state.customTags.forEach(tag => {
                const isActive = tag === currentChartFilter ? "active" : "";
                const iconClass = tagIcons[tag] || "fa-tag";
                chartFilterRow.innerHTML += `<button class="chart-tag-btn ${isActive}" data-cfilter="${tag}"><i class="fas ${iconClass}"></i> ${tag}</button>`;
            });

            document.querySelectorAll("#chartFilterRow .chart-tag-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    document.querySelectorAll("#chartFilterRow .chart-tag-btn").forEach(b => b.classList.remove("active"));
                    e.currentTarget.classList.add("active");
                    currentChartFilter = e.currentTarget.getAttribute("data-cfilter");
                    updateChart();
                });
            });
        }

        function rebindSelectorEvents() {
            document.querySelectorAll("#tagSelector .tag-btn:not(.add-custom-tag-btn)").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    document.querySelectorAll("#tagSelector .tag-btn").forEach(b => b.classList.remove("active"));
                    e.currentTarget.classList.add("active");
                    currentSelectedTag = e.currentTarget.getAttribute("data-tag");
                });
            });

            document.getElementById("addCustomTagBtn").addEventListener("click", () => {
                const newTagName = prompt("請輸入新分類名稱：");
                if (newTagName && newTagName.trim() !== "") {
                    const clean = newTagName.trim();
                    if (!state.customTags.includes(clean)) {
                        state.customTags.push(clean);
                        currentSelectedTag = clean;
                        saveToStorage();
                        renderSelectors();
                        renderChartSelectors();
                        render();
                    }
                }
            });

            document.querySelectorAll("#filterRow .filter-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    document.querySelectorAll("#filterRow .filter-btn").forEach(b => b.classList.remove("active"));
                    e.currentTarget.classList.add("active");
                    currentFilter = e.currentTarget.getAttribute("data-filter");
                    render();
                });
            });
        }

        function checkStreak() {
            const today = new Date().toLocaleDateString();
            if (state.lastActiveDate && state.lastActiveDate !== today) {
                const lastDate = new Date(state.lastActiveDate);
                const todayDate = new Date(today);
                const diffDays = Math.ceil(Math.abs(todayDate - lastDate) / (1000 * 60 * 60 * 24));
                if (diffDays === 1) state.streak += 1;
                else if (diffDays > 1) state.streak = 1;
            } else if (!state.lastActiveDate) {
                state.streak = 1;
            }
            state.lastActiveDate = today;
        }

        function checkAndResetRepeatingTasks() {
            const todayStr = new Date().toLocaleDateString();
            const lastResetDate = localStorage.getItem("last_reset_date");
            if (lastResetDate !== todayStr) {
                let changed = false;
                const today = new Date();
                state.tasks.forEach(t => {
                    if (t.completed && t.freq !== "單次") {
                        if (t.freq === "每日" || (t.freq === "每週" && today.getDay() === 1) || (t.freq === "每月" && today.getDate() === 1)) {
                            t.completed = false;
                            changed = true;
                        }
                    }
                });
                localStorage.setItem("last_reset_date", todayStr);
                if (changed) saveToStorage();
            }
        }

        function gainXP(amount) {
            state.xp += amount;
            if (state.xp >= 100) { state.xp -= 100; state.level += 1; alert(`🔮 成長大升級！恭喜你達到了 LV. ${state.level}！`); } 
            else if (state.xp < 0) { if (state.level > 1) { state.level -= 1; state.xp = 100 + state.xp; } else { state.xp = 0; } }
            saveToStorage(); 
            render();
        }

        function initEventListeners() {
            document.getElementById("addTaskBtn").addEventListener("click", addTask);
            document.getElementById("taskInput").addEventListener("keypress", (e) => { if (e.key === "Enter") addTask(); });

            const toggleHeader = document.getElementById("chartToggleBtn");
            const wrapper = document.getElementById("chartWrapper");
            const arrow = document.getElementById("arrowIcon");

            toggleHeader.addEventListener("click", () => {
                if (wrapper.style.display === "flex") { wrapper.style.display = "none"; arrow.className = "fas fa-chevron-down"; } 
                else {
                    wrapper.style.display = "flex"; arrow.className = "fas fa-chevron-up";
                    if (!myChart) initChart(); else updateChart();
                    setTimeout(() => { toggleHeader.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 150);
                }
            });

            document.querySelectorAll(".range-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("active"));
                    e.currentTarget.classList.add("active");
                    currentRange = parseInt(e.currentTarget.getAttribute("data-range"));
                    updateChart();
                });
            });
        }

        function addTask() {
            const input = document.getElementById("taskInput");
            const text = input.value.trim();
            if (!text) return;
            state.tasks.push({ id: Date.now(), text: text, tag: currentSelectedTag, freq: currentSelectedFreq, completed: false });
            input.value = "";
            checkStreak();
            gainXP(2); 
        }

        function toggleTask(id) {
            const task = state.tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                const todayStr = new Date().toLocaleDateString();
                if (!state.historyDataV2[todayStr]) state.historyDataV2[todayStr] = {};
                
                if (task.completed) {
                    state.completedCount += 1;
                    checkStreak();
                    gainXP(10); 
                    state.historyData[todayStr] = (state.historyData[todayStr] || 0) + 1;
                    state.historyDataV2[todayStr][task.tag] = (state.historyDataV2[todayStr][task.tag] || 0) + 1;
                } else {
                    state.completedCount = Math.max(0, state.completedCount - 1);
                    gainXP(-10); 
                    if (state.historyData[todayStr]) state.historyData[todayStr] = Math.max(0, state.historyData[todayStr] - 1);
                    if (state.historyDataV2[todayStr] && state.historyDataV2[todayStr][task.tag]) {
                        state.historyDataV2[todayStr][task.tag] = Math.max(0, state.historyData[todayStr][task.tag] - 1);
                    }
                }
                saveToStorage();
                render();
                updateChart(); 
            }
        }

        function editTask(id) {
            const task = state.tasks.find(t => t.id === id);
            if (!task) return;
            const newText = prompt("✏️ 修改你的手寫念頭：", task.text);
            if (newText && newText.trim() !== "") { task.text = newText.trim(); saveToStorage(); render(); }
        }

        function deleteTask(id) {
            const taskToDelete = state.tasks.find(t => t.id !== id);
            if (!taskToDelete) return;
            if (taskToDelete.completed) {
                gainXP(-12);
                const todayStr = new Date().toLocaleDateString();
                if (state.historyData[todayStr]) state.historyData[todayStr] = Math.max(0, state.historyData[todayStr] - 1);
                if (state.historyDataV2[todayStr] && state.historyDataV2[todayStr][taskToDelete.tag]) {
                    state.historyDataV2[todayStr][taskToDelete.tag] = Math.max(0, state.historyData[todayStr][taskToDelete.tag] - 1);
                }
                state.completedCount = Math.max(0, state.completedCount - 1);
            } else { gainXP(-2); }
            state.tasks = state.tasks.filter(t => t.id !== id);
            saveToStorage(); 
            render();
            if (myChart) updateChart();
        }

        function getChartValue(dateStr, tagFilter) {
            if (tagFilter === "全部") return state.historyData[dateStr] || 0;
            return (state.historyDataV2[dateStr] && state.historyDataV2[dateStr][tagFilter]) ? state.historyDataV2[dateStr][tagFilter] : 0;
        }

        function initChart() {
            const ctx = document.getElementById('historyChart').getContext('2d');
            const labels = []; const chartData = [];
            for (let i = currentRange - 1; i >= 0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i); const dateStr = d.toLocaleDateString();
                labels.push(`${d.getMonth()+1}/${d.getDate()}`); chartData.push(getChartValue(dateStr, currentChartFilter));
            }
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '縫製點子數', data: chartData, borderColor: '#f7a3a1',
                        backgroundColor: 'rgba(247, 163, 161, 0.1)', borderWidth: 3, tension: 0.3,
                        pointBackgroundColor: '#b56c4d', pointRadius: currentRange === 30 ? 1 : 3
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1, color: '#a69282', font: { size: 10 } }, grid: { color: 'rgba(204, 164, 131, 0.08)' } },
                        x: { ticks: { color: '#a69282', font: { size: 10 } }, grid: { display: false } }
                    }
                }
            });
        }

        function updateChart() {
            if (!myChart) return;
            const labels = []; const chartData = [];
            for (let i = currentRange - 1; i >= 0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i); const dateStr = d.toLocaleDateString();
                labels.push(`${d.getMonth()+1}/${d.getDate()}`); chartData.push(getChartValue(dateStr, currentChartFilter));
            }
            myChart.data.labels = labels; myChart.data.datasets[0].data = chartData;
            myChart.data.datasets[0].pointRadius = currentRange === 30 ? 1 : 3;
            myChart.update();
        }

        function updateCounters() {
            const counts = { "全部": state.tasks.length }; state.customTags.forEach(tag => counts[tag] = 0);
            state.tasks.forEach(t => { if (counts[t.tag] !== undefined) counts[t.tag]++; });
            Object.keys(counts).forEach(key => { const el = document.getElementById(`count-${key}`); if (el) el.innerText = counts[key]; });
        }

        function render() {
            let lvlIcon = "🛡️"; 
            if (state.level > 3 && state.level <= 5) lvlIcon = "🪃"; if (state.level > 5 && state.level <= 7) lvlIcon = "🗡️"; 
            if (state.level > 7 && state.level <= 9) lvlIcon = "⚔️"; if (state.level > 9 && state.level <= 10) lvlIcon = "🪄"; 
            if (state.level > 10) lvlIcon = "👑"; 

            // 👑 修正核心：文字和圖示內嵌排版，外加 CSS 萬能鎖強制鎖定圓體
            document.getElementById("levelDisplay").innerHTML = `
                <div class="lvl-text-num">LV. ${state.level}</div>
                <div class="lvl-icon-large">${lvlIcon}</div>
            `;
            
            const titleIndex = Math.min(Math.floor((state.level - 1) / 3), titles.length - 1);
            document.getElementById("titleDisplay").innerText = titles[titleIndex];
            document.getElementById("xpText").innerText = `${state.xp} / 100 XP`;
            document.getElementById("progressBar").style.width = `${state.xp}%`;
            document.getElementById("streakDisplay").innerText = state.streak;
            document.getElementById("completedCountDisplay").innerText = state.completedCount;

            updateCounters();
            const listContainer = document.getElementById("taskList"); const currentScroll = listContainer.scrollTop; listContainer.innerHTML = "";
            const filteredTasks = state.tasks.filter(t => currentFilter === "全部" || t.tag === currentFilter);

            if (filteredTasks.length === 0) {
                listContainer.innerHTML = `<div class="empty-state"><div class="empty-icon">🧸</div><p>布偶熊在空籃子裡等你。<br>新增一個閃念，織出你的第一份成就吧！</p></div>`;
                return;
            }

            filteredTasks.forEach(task => {
                const item = document.createElement("div"); item.className = `task-item ${task.completed ? 'completed' : ''}`;
                if(task.tag === "購物清單") item.style.borderLeftColor = "var(--accent-yellow)";
                else if(task.tag === "想讀的書") item.style.borderLeftColor = "var(--accent-blue)";
                else if(task.tag === "運動") item.style.borderLeftColor = "var(--accent-green)";
                else if(task.tag === "保險" || task.tag === "客戶") item.style.borderLeftColor = "var(--accent-purple)";
                else item.style.borderLeftColor = "var(--accent-pink)";

                item.innerHTML = `
                    <div class="task-left">
                        <div class="custom-checkbox" onclick="toggleTask(${task.id})"><i class="fas fa-check"></i></div>
                        <div class="task-content" onclick="editTask(${task.id})">
                            <span class="task-text">${task.text}</span>
                            <div class="task-badges"><span class="task-tag">${task.tag}</span>${task.freq !== '單次' ? `<span class="task-freq"><i class="fas fa-redo-alt"></i> ${task.freq}</span>` : ''}</div>
                        </div>
                    </div>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteTask(${task.id})"><i class="fas fa-scissors"></i></button>
                `;
                listContainer.appendChild(item);
            });
            listContainer.scrollTop = currentScroll;
        }
    </script>
</body>
</html>
