<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>閃念任務簿 - 點子冒險</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #fcf8f2; /* 溫暖的日系手作奶油白 */
            --card-bg: #ffffff;
            --stitch-color: #cca483; /* 縫線的咖啡色 */
            --accent-pink: #f7a3a1; /* 手作布偶粉 */
            --accent-green: #a8d3bb; /* 森林手繪綠 */
            --accent-yellow: #fcd59b; /* 溫馨黃 */
            --accent-blue: #a3c9e6; /* 晴空藍 */
            --accent-purple: #c5b3e6; /* 薰衣草紫 */
            --text-main: #695749; /* 深咖啡色字體，拒絕死黑 */
            --text-muted: #a69282;
            --border-radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Zen Maru Gothic", "Chalkboard SE", "Microsoft JhengHei", sans-serif;
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊藍色陰影 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-y: auto;
            /* 打造溫馨的手作格紋布或針織紋理背景 */
            background-image: linear-gradient(rgba(204, 164, 131, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(204, 164, 131, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 24px;
        }

        /* 標題區 */
        .header {
            text-align: center;
            margin-bottom: 2px;
            flex-shrink: 0;
        }

        .header h1 {
            color: #b56c4d;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .header h1 i {
            color: var(--accent-pink);
            animation: bounce 2s ease-in-out infinite;
        }

        .header p {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 2px;
        }

        /* 👑 雲端同步狀態條（強制隱形魔法） */
        .sync-banner {
            display: none !important;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-4px) scale(1.05); }
        }

        /* 經典拼布手作卡片 */
        .stitch-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 16px;
            box-shadow: 0 4px 12px rgba(166, 146, 130, 0.12);
            border: 2px dashed var(--stitch-color);
            position: relative;
            flex-shrink: 0;
        }

        .level-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .level-badge {
            background-color: var(--accent-yellow);
            border: 2px dashed #ffffff;
            color: #b56c4d;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 8px rgba(166, 146, 130, 0.2);
            flex-shrink: 0;
        }

        .level-progress-container {
            flex-grow: 1;
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .current-title {
            font-size: 14px;
            font-weight: bold;
            color: #b56c4d;
        }

        .xp-text {
            font-size: 11px;
            color: var(--text-muted);
        }

        .progress-bar-bg {
            background-color: #f3ece4;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #e2d7cb;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-yellow));
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-box {
            background-color: #fffdfa;
            border-radius: 14px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #ebdccb;
        }

        .stat-icon { font-size: 16px; }
        .stat-icon.fire { color: var(--accent-pink); }
        .stat-icon.check { color: var(--accent-green); }

        .stat-details div:first-child {
            font-size: 15px;
            font-weight: bold;
        }

        .stat-details div:last-child {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* 輸入區塊 */
        .input-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 14px;
            box-shadow: 0 4px 12px rgba(166, 146, 130, 0.12);
            border: 2px dashed var(--stitch-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-row input {
            flex-grow: 1;
            background-color: #faf6f0;
            border: 2px solid #ebdccb;
            border-radius: 14px;
            padding: 10px 14px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .input-row input:focus {
            border-color: var(--accent-pink);
            background-color: #ffffff;
        }

        .add-btn {
            background-color: #e88d67;
            border: 2px solid #ffffff;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(166, 146, 130, 0.2);
            transition: transform 0.1s;
            flex-shrink: 0;
        }

        .add-btn:active { transform: scale(0.95); }

        .tag-selector, .frequency-selector, .filter-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            flex-shrink: 0;
        }

        .tag-selector::-webkit-scrollbar, .frequency-selector::-webkit-scrollbar, .filter-row::-webkit-scrollbar {
            display: none;
        }

        .section-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 1px;
            margin-bottom: -4px;
            font-weight: bold;
        }

        .tag-btn, .freq-btn, .filter-btn, .range-btn {
            background-color: #faf6f0;
            border: 1px dashed var(--stitch-color);
            color: var(--text-main);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .tag-btn.active {
            background-color: var(--accent-pink);
            border-style: solid;
            border-color: #ffffff;
            color: white;
        }

        .freq-btn.active {
            background-color: var(--accent-green);
            border-style: solid;
            border-color: #ffffff;
            color: white;
        }

        .add-custom-tag-btn {
            background-color: transparent;
            border: 1px dashed #b56c4d;
            color: #b56c4d;
            padding: 5px 10px;
        }

        .filter-row {
            flex-shrink: 0;
        }
        .filter-btn {
            background-color: var(--card-bg);
            border: 1px dashed #ebdccb;
            box-shadow: 0 4px 8px rgba(166, 146, 130, 0.06);
        }

        .filter-btn.active {
            background-color: var(--accent-blue);
            border-style: solid;
            border-color: #ffffff;
            color: white;
        }

        /* 任務列表 */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 320px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .task-list::-webkit-scrollbar {
            width: 4px;
        }
        .task-list::-webkit-scrollbar-thumb {
            background-color: rgba(204, 164, 131, 0.3);
            border-radius: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 35px 20px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: #ffffff;
            border-radius: var(--border-radius);
            border: 2px dashed #ebdccb;
        }

        .empty-icon {
            font-size: 40px;
            color: var(--accent-pink);
        }

        .task-item {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(166, 146, 130, 0.08);
            border: 1px solid #f3ece4;
            border-left: 5px solid var(--accent-pink);
            animation: fadeIn 0.2s ease;
            flex-shrink: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
            cursor: pointer;
        }

        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #cca483;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: transparent;
            font-size: 11px;
            transition: all 0.2s;
            background-color: #ffffff;
            flex-shrink: 0;
        }

        .task-item.completed .custom-checkbox {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
            color: white;
        }

        .task-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
        }

        .task-text {
            font-size: 14px;
            font-weight: 500;
            word-break: break-all;
            transition: color 0.2s;
        }
        .task-text:active {
            color: #b56c4d;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .task-tag {
            font-size: 10px;
            color: #b56c4d;
            background-color: #f7ede2;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .task-freq {
            font-size: 10px;
            color: #e88d67;
            background-color: #fff3ed;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ebdccb;
            cursor: pointer;
            font-size: 14px;
            padding: 6px;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .delete-btn:hover { color: var(--accent-pink); }

        /* 歷程檢視抽屜 */
        .chart-toggle-header {
            background-color: #ebdccb;
            color: #b56c4d;
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px dashed var(--stitch-color);
            transition: all 0.2s;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .chart-container-wrapper {
            display: none;
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 14px;
            box-shadow: 0 4px 12px rgba(166, 146, 130, 0.12);
            border: 2px dashed var(--stitch-color);
            flex-direction: column;
            gap: 10px;
            animation: slideDown 0.3s ease-out;
            flex-shrink: 0;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chart-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .range-selector-row {
            display: flex;
            gap: 6px;
        }

        .range-btn {
            padding: 3px 10px;
            font-size: 11px;
            border-radius: 12px;
        }

        .range-btn.active {
            background-color: var(--accent-blue);
            border-style: solid;
            border-color: #ffffff;
            color: white;
        }

        /* 備份按鈕 */
        .backup-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding-top: 6px;
            padding-bottom: 12px;
            flex-shrink: 0;
        }

        .backup-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .backup-btn:hover { color: #b56c4d; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-teddy-bear"></i> 閃念任務簿</h1>
            <p>縫製每一個閃念，織成最棒的自己 🧶</p>
        </div>

        <div class="sync-banner" style="display: none !important;">
            <span class="sync-status" id="syncStatus">讀取中...</span>
        </div>

        <div class="stitch-card">
            <div class="level-info">
                <div class="level-badge" id="levelDisplay">1<span>Lv</span></div>
                <div class="level-progress-container">
                    <div class="title-row">
                        <span class="current-title" id="titleDisplay">迷途夢想家</span>
                        <span class="xp-text" id="xpText">0 / 100 XP</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progressBar"></div>
                    </div>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-icon fire"><i class="fas fa-heart"></i></div>
                    <div class="stat-details">
                        <div id="streakDisplay">0</div>
                        <div>連續記錄天數</div>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon check"><i class="fas fa-gift"></i></div>
                    <div class="stat-details">
                        <div id="completedCountDisplay">0</div>
                        <div>已缝製點子</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-card">
            <div class="input-row">
                <input type="text" id="taskInput" placeholder="捕捉到一個手寫念頭...">
                <button class="add-btn" id="addTaskBtn"><i class="fas fa-plus"></i></button>
            </div>
            
            <div class="section-label">🧵 選擇分類：</div>
            <div class="tag-selector" id="tagSelector"></div>

            <div class="section-label">🔄 重複頻率：</div>
            <div class="frequency-selector" id="freqSelector">
                <button class="freq-btn active" data-freq="單次"><i class="fas fa-star"></i> 單次</button>
                <button class="freq-btn" data-freq="每日"><i class="fas fa-clock"></i> 每日</button>
                <button class="freq-btn" data-freq="每週"><i class="fas fa-calendar-alt"></i> 每週</button>
                <button class="freq-btn" data-freq="每月"><i class="fas fa-cloud"></i> 每月</button>
            </div>
        </div>

        <div class="filter-row" id="filterRow"></div>

        <div class="task-list" id="taskList"></div>

        <div class="chart-toggle-header" id="chartToggleBtn">
            <span><i class="fas fa-chart-line"></i> 📊 查看冒險歷程圖表</span>
            <i class="fas fa-chevron-down" id="arrowIcon"></i>
        </div>

        <div class="chart-container-wrapper" id="chartWrapper">
            <div class="chart-controls">
                <span style="font-size: 12px; font-weight: bold; color: #b56c4d;">🧶 縫製能量歷史紀錄</span>
                <div class="range-selector-row">
                    <button class="range-btn active" data-range="7">7D</button>
                    <button class="range-btn" data-range="30">30D</button>
                </div>
            </div>
            <canvas id="historyChart" style="max-height: 120px; width: 100%;"></canvas>
        </div>

        <div class="backup-section">
            <button class="backup-btn" onclick="exportData()"><i class="fas fa-save"></i> 複製備份碼</button>
            <button class="backup-btn" onclick="importData()"><i class="fas fa-file-import"></i> 還原進度</button>
        </div>
    </div>

    <script>
        const CLOUD_STORAGE_KEY = "feather_quest_log_v1_sticky";
        const CLOUD_API_URL = `https://api.jsonbin.io/v3/b`;
        const CLOUD_SECRET = "$2a$10$WpP69bV0cEn.iH6f6N7P6eS9p3SWhC3i97p6wPqQpU.vWfUqO3bI2"; 

        let state = {
            level: 1,
            xp: 0,
            streak: 0,
            completedCount: 0,
            tasks: [],
            customTags: ["待辦任務", "購物清單", "想讀的書"],
            lastActiveDate: "",
            historyData: {},
            binId: "" 
        };

        const titles = ["迷途夢想家", "見習冒險者", "精靈使者", "閃念掌控者", "行動傳奇"];
        let currentSelectedTag = "待辦任務";
        let currentSelectedFreq = "單次";
        let currentFilter = "全部";
        let currentRange = 7; 
        let myChart = null;

        const tagIcons = {
            "待辦任務": "fa-clipboard-list",
            "購物清單": "fa-shopping-bag",
            "想讀的書": "fa-book-open",
            "運動": "fa-dumbbell",
            "保險": "fa-shield-heart",
            "客戶": "fa-user-check"
        };

        document.addEventListener("DOMContentLoaded", async () => {
            loadFromStorage();
            checkStreak();
            checkAndResetRepeatingTasks();
            initEventListeners();
            renderSelectors();
            render();
            await syncWithCloud();
        });

        function loadFromStorage() {
            try {
                const savedState = localStorage.getItem("quest_log_state");
                if (savedState) {
                    const parsed = JSON.parse(savedState);
                    state = { ...state, ...parsed };
                }
            } catch (e) {
                console.error("載入本地失敗", e);
            }
        }

        function saveToStorage() {
            localStorage.setItem("quest_log_state", JSON.stringify(state));
            autoUploadCloud();
        }

        // 👑 修正重點 1：優化同步判定，如果是手機主動扣分，強迫雲端跟隨手機
        async function syncWithCloud() {
            let savedBinId = state.binId || localStorage.getItem("quest_log_cloud_bin_id");

            if (!savedBinId) {
                await createNewCloudBin();
                return;
            }

            state.binId = savedBinId;
            localStorage.setItem("quest_log_cloud_bin_id", savedBinId);

            try {
                const res = await fetch(`${CLOUD_API_URL}/${savedBinId}/latest`, {
                    headers: { "X-Master-Key": CLOUD_SECRET }
                });
                if (res.ok) {
                    const cloudData = await res.json();
                    const cloudState = cloudData.record;
                    
                    // 只有當雲端的完成數跟任務數同時大於等於本地時，才覆蓋（若本地剛刪除任務，任務總數會變少，此時不應該被雲端舊資料覆蓋）
                    if (cloudState && cloudState.tasks && cloudState.tasks.length >= state.tasks.length && cloudState.completedCount > state.completedCount) {
                        state = { ...state, ...cloudState, binId: savedBinId };
                        localStorage.setItem("quest_log_state", JSON.stringify(state));
                        renderSelectors();
                        render();
                        if (myChart) updateChart();
                    } else {
                        // 本地因為主動刪除任務而減少了，直接把這個最新權威狀態推給雲端
                        await uploadToCloud();
                    }
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function createNewCloudBin() {
            try {
                const res = await fetch(CLOUD_API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Master-Key": CLOUD_SECRET,
                        "X-Bin-Private": "false"
                    },
                    body: JSON.stringify(state)
                });
                if (res.ok) {
                    const data = await res.json();
                    state.binId = data.metadata.id;
                    localStorage.setItem("quest_log_cloud_bin_id", state.binId);
                    localStorage.setItem("quest_log_state", JSON.stringify(state));
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function uploadToCloud() {
            if (!state.binId) return;
            try {
                await fetch(`${CLOUD_API_URL}/${state.binId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Master-Key": CLOUD_SECRET
                    },
                    body: JSON.stringify(state)
                });
            } catch (e) {
                console.error("背景上傳失敗", e);
            }
        }

        let uploadTimer = null;
        function autoUploadCloud() {
            if (uploadTimer) clearTimeout(uploadTimer);
            uploadTimer = setTimeout(async () => {
                await uploadToCloud();
            }, 1500); 
        }

        function renderSelectors() {
            const tagSelector = document.getElementById("tagSelector");
            tagSelector.innerHTML = "";
            state.customTags.forEach(tag => {
                const isActive = tag === currentSelectedTag ? "active" : "";
                const iconClass = tagIcons[tag] || "fa-tag"; 
                tagSelector.innerHTML += `<button class="tag-btn ${isActive}" data-tag="${tag}"><i class="fas ${iconClass}"></i> ${tag}</button>`;
            });
            tagSelector.innerHTML += `<button class="tag-btn add-custom-tag-btn" id="addCustomTagBtn"><i class="fas fa-plus"></i> 分類</button>`;

            const filterRow = document.getElementById("filterRow");
            filterRow.innerHTML = `<button class="filter-btn ${currentFilter === '全部' ? 'active' : ''}" data-filter="全部">✨ 全部 <span id="count-全部">0</span></button>`;
            state.customTags.forEach(tag => {
                const isActive = tag === currentFilter ? "active" : "";
                const iconClass = tagIcons[tag] || "fa-tag";
                filterRow.innerHTML += `<button class="filter-btn ${isActive}" data-filter="${tag}"><i class="fas ${iconClass}"></i> ${tag} <span id="count-${tag}">0</span></button>`;
            });

            rebindSelectorEvents();
        }

        function rebindSelectorEvents() {
            document.querySelectorAll("#tagSelector .tag-btn:not(.add-custom-tag-btn)").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    document.querySelectorAll("#tagSelector .tag-btn").forEach(b => b.classList.remove("active"));
                    e.currentTarget.classList.add("active");
                    currentSelectedTag = e.currentTarget.getAttribute("data-tag");
                });
            });

            document.getElementById("addCustomTagBtn").addEventListener("click", () => {
                const newTagName = prompt("請輸入新分類名稱：");
                if (newTagName && newTagName.trim() !== "") {
                    const clean = newTagName.trim();
                    if (!state.customTags.includes(clean)) {
                        state.customTags.push(clean);
                        currentSelectedTag = clean;
                        saveToStorage();
                        renderSelectors();
                        render();
                    }
                }
            });

            document.querySelectorAll("#filterRow .filter-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    document.querySelectorAll("#filterRow .filter-btn").forEach(b => b.classList.remove("active"));
                    e.currentTarget.classList.add("active");
                    currentFilter = e.currentTarget.getAttribute("data-filter");
                    render();
                });
            });
        }

        function checkStreak() {
            const today = new Date().toLocaleDateString();
            if (state.lastActiveDate && state.lastActiveDate !== today) {
                const lastDate = new Date(state.lastActiveDate);
                const todayDate = new Date(today);
                const diffDays = Math.ceil(Math.abs(todayDate - lastDate) / (1000 * 60 * 60 * 24));
                if (diffDays === 1) state.streak += 1;
                else if (diffDays > 1) state.streak = 1;
            } else if (!state.lastActiveDate) {
                state.streak = 1;
            }
            state.lastActiveDate = today;
        }

        function checkAndResetRepeatingTasks() {
            const todayStr = new Date().toLocaleDateString();
            const lastResetDate = localStorage.getItem("last_reset_date");
            if (lastResetDate !== todayStr) {
                let changed = false;
                const today = new Date();
                state.tasks.forEach(t => {
                    if (t.completed && t.freq !== "單次") {
                        if (t.freq === "每日" || (t.freq === "每週" && today.getDay() === 1) || (t.freq === "每月" && today.getDate() === 1)) {
                            t.completed = false;
                            changed = true;
                        }
                    }
                });
                localStorage.setItem("last_reset_date", todayStr);
                if (changed) saveToStorage();
            }
        }

        function gainXP(amount) {
            state.xp += amount;
            
            if (state.xp >= 100) {
                state.xp -= 100;
                state.level += 1;
                alert(`🔮 成長大升級！恭喜你達到了 Lv.${state.level}！`);
            } 
            else if (state.xp < 0) {
                if (state.level > 1) {
                    state.level -= 1;
                    state.xp = 100 + state.xp; 
                } else {
                    state.xp = 0; 
                }
            }
            saveToStorage();
            render();
        }

        function initEventListeners() {
            document.querySelectorAll("#freqSelector .freq-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    document.querySelectorAll("#freqSelector .freq-btn").forEach(b => b.classList.remove("active"));
                    e.currentTarget.classList.add("active");
                    currentSelectedFreq = e.currentTarget.getAttribute("data-freq");
                });
            });

            document.getElementById("addTaskBtn").addEventListener("click", addTask);
            document.getElementById("taskInput").addEventListener("keypress", (e) => {
                if (e.key === "Enter") addTask();
            });

            const toggleHeader = document.getElementById("chartToggleBtn");
            const wrapper = document.getElementById("chartWrapper");
            const arrow = document.getElementById("arrowIcon");

            toggleHeader.addEventListener("click", () => {
                if (wrapper.style.display === "flex") {
                    wrapper.style.display = "none";
                    arrow.className = "fas fa-chevron-down";
                } else {
                    wrapper.style.display = "flex";
                    arrow.className = "fas fa-chevron-up";
                    if (!myChart) {
                        initChart(); 
                    } else {
                        updateChart(); 
                    }
                    setTimeout(() => {
                        toggleHeader.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }, 150);
                }
            });

            document.querySelectorAll(".range-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("active"));
                    e.currentTarget.classList.add("active");
                    currentRange = parseInt(e.currentTarget.getAttribute("data-range"));
                    updateChart();
                });
            });
        }

        function addTask() {
            const input = document.getElementById("taskInput");
            const text = input.value.trim();
            if (!text) return;

            state.tasks.push({
                id: Date.now(),
                text: text,
                tag: currentSelectedTag,
                freq: currentSelectedFreq,
                completed: false
            });
            input.value = "";
            gainXP(2); 
        }

        function toggleTask(id) {
            const task = state.tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                const todayStr = new Date().toLocaleDateString();
                
                if (task.completed) {
                    state.completedCount += 1;
                    gainXP(10); 
                    state.historyData[todayStr] = (state.historyData[todayStr] || 0) + 1;
                } else {
                    state.completedCount = Math.max(0, state.completedCount - 1);
                    gainXP(-10); 
                    if (state.historyData[todayStr]) {
                        state.historyData[todayStr] = Math.max(0, state.historyData[todayStr] - 1);
                    }
                }
                saveToStorage();
                render();
                updateChart(); 
            }
        }

        function editTask(id) {
            const task = state.tasks.find(t => t.id === id);
            if (!task) return;
            
            const newText = prompt("✏️ 修改你的手寫念頭：", task.text);
            if (newText && newText.trim() !== "") {
                task.text = newText.trim();
                saveToStorage();
                render();
            }
        }

        // 👑 修正重點 2：在刪除的瞬間，立刻大吼通知雲端覆蓋，絕不留給舊資料復活的機會
        function deleteTask(id) {
            const taskToDelete = state.tasks.find(t => t.id === id);
            if (!taskToDelete) return;

            if (taskToDelete.completed) {
                gainXP(-12);
                const todayStr = new Date().toLocaleDateString();
                if (state.historyData[todayStr]) {
                    state.historyData[todayStr] = Math.max(0, state.historyData[todayStr] - 1);
                }
                state.completedCount = Math.max(0, state.completedCount - 1);
            } else {
                gainXP(-2);
            }

            state.tasks = state.tasks.filter(t => t.id !== id);
            
            // 這裡強制執行一次本地保存與雲端同步
            localStorage.setItem("quest_log_state", JSON.stringify(state));
            uploadToCloud(); // ➔ 略過防抖動計時器，直接覆蓋雲端！
            
            render();
            updateChart();
        }

        function initChart() {
            const ctx = document.getElementById('historyChart').getContext('2d');
            const labels = [];
            const chartData = [];
            
            for (let i = currentRange - 1; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dateStr = d.toLocaleDateString();
                labels.push(`${d.getMonth()+1}/${d.getDate()}`);
                chartData.push(state.historyData[dateStr] || 0);
            }

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '縫製點子數',
                        data: chartData,
                        borderColor: '#f7a3a1',
                        backgroundColor: 'rgba(247, 163, 161, 0.1)',
                        borderWidth: 3,
                        tension: 0.3,
                        pointBackgroundColor: '#b56c4d',
                        pointRadius: currentRange === 30 ? 1 : 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1, color: '#a69282', font: { size: 10 } },
                            grid: { color: 'rgba(204, 164, 131, 0.08)' }
                        },
                        x: {
                            ticks: { color: '#a69282', maxRotation: 45, font: { size: 10 } },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function updateChart() {
            if (!myChart) return;
            const labels = [];
            const chartData = [];
            
            for (let i = currentRange - 1; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dateStr = d.toLocaleDateString();
                labels.push(`${d.getMonth()+1}/${d.getDate()}`);
                chartData.push(state.historyData[dateStr] || 0);
            }
            
            myChart.data.labels = labels;
            myChart.data.datasets[0].data = chartData;
            myChart.data.datasets[0].pointRadius = currentRange === 30 ? 1 : 3;
            myChart.update();
        }

        function exportData() {
            const code = btoa(encodeURIComponent(JSON.stringify(state)));
            navigator.clipboard.writeText(code).then(() => {
                alert("🔮 備份成功！精靈代碼已複製。如果跨手機/跨瀏覽器，可以用還原進度來搬家喔！");
            });
        }

        function importData() {
            const code = prompt("請貼上之前備份的精靈代碼：");
            if (code) {
                try {
                    const decoded = JSON.parse(decodeURIComponent(atob(code.trim())));
                    if (decoded.level && decoded.tasks) {
                        state = decoded;
                        saveToStorage();
                        renderSelectors();
                        render();
                        updateChart();
                        alert("✨ 魔法還原成功！所有閃念精靈與等級都回來了！");
                    } else {
                        alert("代碼格式不正確喔！");
                    }
                } catch(e) {
                    alert("還原失敗，請確保代碼完整。");
                }
            }
        }

        function updateCounters() {
            const counts = { "全部": state.tasks.length };
            state.customTags.forEach(tag => counts[tag] = 0);
            state.tasks.forEach(t => { if (counts[t.tag] !== undefined) counts[t.tag]++; });
            Object.keys(counts).forEach(key => {
                const el = document.getElementById(`count-${key}`);
                if (el) el.innerText = counts[key];
            });
        }

        function render() {
            let lvlIcon = "🛡️"; 
            if (state.level > 3 && state.level <= 5) lvlIcon = "🪃";  
            if (state.level > 5 && state.level <= 7) lvlIcon = "🗡️"; 
            if (state.level > 7 && state.level <= 9) lvlIcon = "⚔️"; 
            if (state.level > 9 && state.level <= 10) lvlIcon = "🪄"; 
            if (state.level > 10) lvlIcon = "👑"; 

            document.getElementById("levelDisplay").innerHTML = `${state.level}<span style="font-size:11px; font-weight:normal; margin-top:2px;">${lvlIcon}</span>`;
            
            const titleIndex = Math.min(Math.floor((state.level - 1) / 3), titles.length - 1);
            document.getElementById("titleDisplay").innerText = titles[titleIndex];
            document.getElementById("xpText").innerText = `${state.xp} / 100 XP`;
            document.getElementById("progressBar").style.width = `${state.xp}%`;
            document.getElementById("streakDisplay").innerText = state.streak;
            document.getElementById("completedCountDisplay").innerText = state.completedCount;

            updateCounters();

            const listContainer = document.getElementById("taskList");
            const currentScroll = listContainer.scrollTop; 
            listContainer.innerHTML = "";

            const filteredTasks = state.tasks.filter(t => currentFilter === "全部" || t.tag === currentFilter);

            if (filteredTasks.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🧸</div>
                        <p>布偶熊在空籃子裡等你。<br>新增一個閃念，織出你的第一份成就吧！</p>
                    </div>`;
                return;
            }

            filteredTasks.forEach(task => {
                const item = document.createElement("div");
                item.className = `task-item ${task.completed ? 'completed' : ''}`;
                
                if(task.tag === "購物清單") item.style.borderLeftColor = "var(--accent-yellow)";
                else if(task.tag === "想讀的書") item.style.borderLeftColor = "var(--accent-blue)";
                else if(task.tag === "運動") item.style.borderLeftColor = "var(--accent-green)";
                else if(task.tag === "保險" || task.tag === "客戶") item.style.borderLeftColor = "var(--accent-purple)";
                else item.style.borderLeftColor = "var(--accent-pink)";

                item.innerHTML = `
                    <div class="task-left">
                        <div class="custom-checkbox" onclick="toggleTask(${task.id})"><i class="fas fa-check"></i></div>
                        <div class="task-content" onclick="editTask(${task.id})">
                            <span class="task-text">${task.text}</span>
                            <div class="task-badges">
                                <span class="task-tag">${task.tag}</span>
                                ${task.freq !== '單次' ? `<span class="task-freq"><i class="fas fa-redo-alt"></i> ${task.freq}</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteTask(${task.id})">
                        <i class="fas fa-scissors"></i>
                    </button>
                `;
                listContainer.appendChild(item);
            });
            listContainer.scrollTop = currentScroll;
        }
    </script>
</body>
</html>
